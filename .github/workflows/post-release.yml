name: Post Release Verification

on:
  release:
    types: [published]

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  pypi-install:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
      - name: Install released package from PyPI
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          python -m pip install --upgrade pip
          python -m pip install "ocsfkit==${VERSION}"
          ocsfkit --version
          ocsfkit schema --format jsonschema

  homebrew-install:
    runs-on: macos-latest
    steps:
      - name: Install released formula from tap
        run: |
          brew update
          brew tap pfrederiksen/tap
          brew reinstall ocsfkit
          ocsfkit --version
          ocsfkit pack list
