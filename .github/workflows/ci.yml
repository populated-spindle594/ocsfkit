name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest

  install-wheel:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
      - name: Build wheel
        run: |
          python -m pip install --upgrade build
          python -m build --wheel
      - name: Install wheel
        run: |
          python -m venv /tmp/ocsfkit-wheel
          /tmp/ocsfkit-wheel/bin/python -m pip install dist/*.whl
          /tmp/ocsfkit-wheel/bin/ocsfkit --help
          /tmp/ocsfkit-wheel/bin/ocsfkit schema

  install-homebrew:
    runs-on: macos-latest
    steps:
      - name: Install from tap
        run: |
          brew tap pfrederiksen/tap
          brew install ocsfkit
          ocsfkit --help
