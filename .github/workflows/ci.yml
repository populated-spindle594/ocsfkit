name: CI

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Install
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev]"
      - name: Lint
        run: ruff check .
      - name: Test
        run: pytest

  install-wheel:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: "3.12"
      - name: Build wheel
        run: |
          python -m pip install --upgrade build
          python -m build --wheel
      - name: Install wheel
        run: |
          python -m venv /tmp/ocsfkit-wheel
          /tmp/ocsfkit-wheel/bin/python -m pip install dist/*.whl
          /tmp/ocsfkit-wheel/bin/ocsfkit --help
          /tmp/ocsfkit-wheel/bin/ocsfkit schema

  install-homebrew:
    runs-on: macos-latest
    steps:
      - name: Install from tap
        run: |
          brew tap pfrederiksen/tap
          brew install ocsfkit
          ocsfkit --help
