name: Docker

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read
  packages: write

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
        with:
          persist-credentials: false
      - name: Build image
        run: docker build -t ghcr.io/pfrederiksen/ocsfkit:${GITHUB_SHA} .
      - name: Login to GHCR
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "${{ github.token }}" | docker login ghcr.io -u "${{ github.actor }}" --password-stdin
      - name: Push release image
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          docker tag ghcr.io/pfrederiksen/ocsfkit:${GITHUB_SHA} ghcr.io/pfrederiksen/ocsfkit:${VERSION}
          docker tag ghcr.io/pfrederiksen/ocsfkit:${GITHUB_SHA} ghcr.io/pfrederiksen/ocsfkit:latest
          docker push ghcr.io/pfrederiksen/ocsfkit:${VERSION}
          docker push ghcr.io/pfrederiksen/ocsfkit:latest
