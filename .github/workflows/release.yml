name: Release

on:
  push:
    tags: ["v*"]

permissions:
  attestations: write
  contents: write
  id-token: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

jobs:
  release:
    runs-on: ubuntu-latest
    environment:
      name: pypi
      url: https://pypi.org/p/ocsfkit
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
      - name: Install build tooling
        run: python -m pip install --upgrade build
      - name: Build distributions
        run: python -m build
      - name: Generate artifact attestations
        uses: actions/attest-build-provenance@a2bbfa25375fe432b6a289bc6b6cd05ecd0c4c32
        with:
          subject-path: dist/*
      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@cef221092ed1bacb1cc03d23a2d87d1d172e277b
      - name: Publish GitHub release assets
        run: gh release create "${GITHUB_REF_NAME}" dist/* --generate-notes
        env:
          GH_TOKEN: ${{ github.token }}

  update-homebrew:
    needs: release
    runs-on: ubuntu-latest
    if: ${{ vars.HOMEBREW_TAP_ENABLED == 'true' }}
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd
      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405
        with:
          python-version: "3.12"
      - name: Update Homebrew tap
        env:
          GH_TOKEN: ${{ secrets.HOMEBREW_TAP_TOKEN }}
          TAG: ${{ github.ref_name }}
        run: |
          python scripts/update_homebrew_formula.py \
            --tap pfrederiksen/homebrew-tap \
            --formula Formula/ocsfkit.rb \
            --version "${TAG#v}" \
            --archive-url "https://github.com/pfrederiksen/ocsfkit/releases/download/${TAG}/ocsfkit-${TAG#v}.tar.gz"
