schema_version: 1.7.0
ocsf_version: 1.7.0
requires_ocsfkit: ">=0.7.0,<1.0.0"
target_class:
  class_uid: 1007
  class_name: Process Activity
  category_uid: 1
  category_name: System Activity
fields:
  time:
    from: "$.@timestamp"
    transform: parse_timestamp
    required: true
  activity_id:
    default: 1
  activity_name:
    default: Launch
  message:
    from: "$.action"
  metadata.product.name:
    default: GitHub Audit Log
  actor.user.name:
    from: "$.actor"
  actor.user.uid:
    from: "$.actor_id"
    transform: to_string
  process.name:
    from: "$.action"
  src_endpoint.ip:
    from: "$.ip"
drop:
- "$.user_agent"
metadata:
  source_product: GitHub Audit Log
  source_version: example
  owner: ocsfkit maintainers
  maturity: example
  last_reviewed: '2026-05-18'
  fixture: fixtures/github_audit_event.json
