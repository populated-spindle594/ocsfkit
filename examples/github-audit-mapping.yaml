schema_version: 1.7.0

target_class:
  class_uid: 1007
  class_name: Process Activity
  category_uid: 1
  category_name: System Activity

fields:
  time:
    from: $.@timestamp
    transform: parse_timestamp
    required: true

  activity_id:
    default: 1

  activity_name:
    default: Launch

  message:
    from: $.action

  metadata.product.name:
    default: GitHub Audit Log

  actor.user.name:
    from: $.actor

  actor.user.uid:
    from: $.actor_id
    transform: to_string

  process.name:
    from: $.action

  src_endpoint.ip:
    from: $.ip

drop:
  - $.user_agent

