schema_version: 1.7.0

custom_transforms:
  - custom_transforms.py

target_class:
  class_uid: 3002
  class_name: Authentication
  category_uid: 3
  category_name: Identity & Access Management

fields:
  time:
    from: $.eventTime
    transform: parse_timestamp
    required: true

  activity_id:
    default: 1

  activity_name:
    default: Logon

  message:
    from: $.eventName

  metadata.product.name:
    default: AWS CloudTrail

  cloud.account_uid:
    from: $.recipientAccountId

  cloud.region:
    from: $.awsRegion

  actor.user.name:
    from: $.userIdentity.userName

  actor.user.uid:
    from: $.userIdentity.principalId

  status:
    from: $.responseElements.ConsoleLogin
    transform: normalize_login_status

  status_id:
    from: $.responseElements.ConsoleLogin
    transform: login_status_to_id

drop:
  - $.requestParameters
