schema_version: 1.7.0

target_class:
  class_uid: 4001
  class_name: Network Activity
  category_uid: 4
  category_name: Network Activity

fields:
  time:
    from: $.Receive Time
    transform: parse_timestamp
    required: true

  activity_id:
    default: 6

  activity_name:
    default: Traffic

  message:
    from: $.Action

  metadata.product.name:
    default: Palo Alto Networks Firewall

  device.hostname:
    from: $.Device Name

  src_endpoint.ip:
    from: $.Source address

  src_endpoint.port:
    from: $.Source Port

  dst_endpoint.ip:
    from: $.Destination address

  dst_endpoint.port:
    from: $.Destination Port

drop:
  - $.Type
  - $.Subtype

