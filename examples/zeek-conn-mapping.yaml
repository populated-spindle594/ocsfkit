schema_version: 1.7.0
ocsf_version: 1.7.0
requires_ocsfkit: ">=0.7.0,<1.0.0"
target_class:
  class_uid: 4001
  class_name: Network Activity
  category_uid: 4
  category_name: Network Activity
fields:
  time:
    from: "$.ts"
    transform: epoch_seconds_to_ms
    required: true
  activity_id:
    default: 6
  activity_name:
    default: Traffic
  message:
    from: "$.service"
  metadata.product.name:
    default: Zeek
  src_endpoint.ip:
    from: "$.id.orig_h"
  src_endpoint.port:
    from: "$.id.orig_p"
  dst_endpoint.ip:
    from: "$.id.resp_h"
  dst_endpoint.port:
    from: "$.id.resp_p"
drop:
- "$.uid"
- "$.duration"
metadata:
  source_product: Zeek
  source_version: example
  owner: ocsfkit maintainers
  maturity: example
  last_reviewed: '2026-05-18'
  fixture: fixtures/zeek_conn.json
