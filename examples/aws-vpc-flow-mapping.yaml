schema_version: 1.7.0

target_class:
  class_uid: 4001
  class_name: Network Activity
  category_uid: 4
  category_name: Network Activity
  metadata.product.name: AWS VPC Flow Logs

fields:
  time:
    from: $.start
    transform: epoch_seconds_to_ms
    required: true
  activity_id:
    default: 6
  activity_name:
    default: Traffic
  src_endpoint.ip:
    from: $.srcaddr
  src_endpoint.port:
    from: $.srcport
  dst_endpoint.ip:
    from: $.dstaddr
  dst_endpoint.port:
    from: $.dstport
  cloud.account_uid:
    from: $.account_id
  cloud.region:
    from: $.region
  status:
    from: $.action
  resources[].name:
    from: $.interface_id
  resources[].type:
    default: Network Interface

drop:
  - $.version
  - $.packets
  - $.bytes
  - $.end
  - $.protocol
  - $.log_status
